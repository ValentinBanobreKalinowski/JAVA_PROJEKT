<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
    <title>Rejestracja</title>
    <style>
        .error{color: red; font-size: 0.9em; display: block;margin-bottom: 10px;}
        .form-group{margin-bottom: 15px;}
    </style>
</head>

<body>
<h1>Witaj w systemie logowania!</h1>
<h2>Rejestracja:</h2>
<form action="/users" method="POST" th:object="${user}">

    <div class="form-group">
    <label for="name">Imie:</label>
    <input type="text" id="name" th:field="*{name}">
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></span>
    </div>

    <div class="form-group">
    <label for="surname">Nazwisko:</label>
    <input type="text" id="surname" th:field="*{surname}">
    <span th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" class="error"></span>
    </div>

    <div class="form-group">
    <label for="password">Haslo::</label>
    <input type="password" id="password" th:field="*{password}">
    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
    </div>

    <div class="form-group">
    <label for="dateOfBirth">Data urodzenia:</label>
    <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}">
    <span th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}" class="error"></span>
    </div>

    <div class="form-group">
    <label for="pesel">PESEL:</label>
    <input type="number" id="pesel" th:field="*{pesel}">
    <span th:if="${#fields.hasErrors('pesel')}" th:errors="*{pesel}" class="error"></span>
    </div>

    <button type="submit">Zarejestruj</button>
</form>
</body>

</html>
